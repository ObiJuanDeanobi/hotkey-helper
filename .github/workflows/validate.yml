name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  data-and-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Validate built-in packs
        run: python tools/validate_pack.py packs
